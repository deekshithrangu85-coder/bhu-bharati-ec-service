<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mock Bhu Bharati Citizen Portal - Search EC</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #007236; border-bottom: 2px solid #007236; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        select, input[type="text"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007236; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:hover { background-color: #005a2b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Search Encumbrance Certificate (EC) Details</h2>
        <form action="/mock-download" method="POST">
            <div class="form-group">
                <label for="district">District</label>
                <select id="district" name="district" required>
                    <option value="">Select District</option>
                    <option value="Rangareddy">Rangareddy</option>
                    <option value="Hyderabad">Hyderabad</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mandal">Mandal</label>
                <select id="mandal" name="mandal" required>
                    <option value="">Select Mandal</option>
                    <option value="Serilingampalle">Serilingampalle</option>
                </select>
            </div>
            <div class="form-group">
                <label for="village">Village</label>
                <select id="village" name="village" required>
                    <option value="">Select Village</option>
                    <option value="Kancha Gachibowli">Kancha Gachibowli</option>
                </select>
            </div>
            <div class="form-group">
                <label for="surveyNo">Survey Number / Sub-Division Number</label>
                <input type="text" id="surveyNo" name="surveyNo" placeholder="e.g. 12/1/a/1/2" required>
            </div>
            <div class="form-group">
                <label for="khataNo">Khata Number</label>
                <input type="text" id="khataNo" name="khataNo" placeholder="e.g. 60001" required>
            </div>
            <button type="submit" id="submitBtn">Search & Download EC PDF</button>
        </form>
    </div>
</body>
</html>
